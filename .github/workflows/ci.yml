name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Django check + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DJANGO_SECRET_KEY: ci-only-not-a-secret
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      LIGHTNING_API_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (locked)
        run: uv sync --frozen

      - name: Django system check
        run: uv run manage.py check

      - name: Run migrations (sanity)
        run: uv run manage.py migrate --run-syncdb --noinput

      - name: Run tests
        run: uv run manage.py test hospital --verbosity 2
